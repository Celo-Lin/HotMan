server:
  port: 8080
  servlet:
    context-path: /hot

spring:
  application:
    name: hot

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  redis:
    host: 127.0.0.1
    port: 6379
    password:
    timeout: PT10S
    lettuce:
      pool:
        max-active: 100
        max-idle: 8
        min-idle: 1
        max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hot.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: D:/hot/log/hot
  config:
    classpath: logback-spring.xml

